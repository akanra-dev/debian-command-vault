version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    reviewers:
      - "akanra-dev"
    labels:
      - "dependencies"
      - "javascript"
    allow:
      - dependency-type: "all"
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    reviewers:
      - "akanra-dev"
    labels:
      - "dependencies"
      - "go"
    allow:
      - dependency-type: "all"
